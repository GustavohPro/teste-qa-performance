name: Performance Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  performance-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup K6
      run: |
        curl https://dl.k6.io/gpg.key | sudo apt-key add -
        echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6-stable.list
        sudo apt-get update
        sudo apt-get install -y k6
    
    - name: Create results directory
      run: mkdir -p results
    
    - name: Run Load Test
      run: k6 run load-test.js --out csv=results/load-test-results.csv --out json=results/load-test-results.json
      continue-on-error: true
    
    - name: Run Spike Test
      run: k6 run spike-test.js --out csv=results/spike-test-results.csv --out json=results/spike-test-results.json
      continue-on-error: true
    
    - name: Upload results as artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-test-results
        path: results/
        retention-days: 30
    
    - name: Publish test results
      if: always()
      run: |
        echo "## Performance Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Load Test" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        head -20 results/load-test-results.csv >> $GITHUB_STEP_SUMMARY || echo "Resultados do Load Test" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Spike Test" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        head -20 results/spike-test-results.csv >> $GITHUB_STEP_SUMMARY || echo "Resultados do Spike Test" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
